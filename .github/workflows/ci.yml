name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "feature/**"
      - "fix/**"
      - "chore/**"

permissions:
  contents: read

jobs:
  verify:
    name: Lint, test, and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm run audit:prod

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:ci

      - name: Build
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run Playwright
        run: npm run e2e

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Compose configs
        run: npm run docker:config

      - name: Build app image
        run: docker build -t lighthouse-app:test .

      - name: Build Kafka tools image
        run: docker build -f Dockerfile.tools -t lighthouse-kafka-tools:test .
