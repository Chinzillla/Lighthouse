name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "feature/**"
      - "fix/**"
      - "chore/**"

jobs:
  verify:
    name: Lint, test, and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:ci

      - name: Build
        run: npm run build

      - name: Run Cypress
        uses: cypress-io/github-action@v6
        with:
          install: false
          start: npm start -- -p 3000
          wait-on: http://localhost:3000
          wait-on-timeout: 120
          command: npm run cypress:run

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build app image
        run: docker build -t lighthouse-app:test .

      - name: Build Kafka tools image
        run: docker build -f Dockerfile.tools -t lighthouse-kafka-tools:test .
