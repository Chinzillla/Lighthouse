name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

jobs:
  verify:
    name: Lint, test, and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:ci

      - name: Build
        run: npm run build

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build app image
        run: docker build -t lighthouse-app:test .

      - name: Build Kafka tools image
        run: docker build -f Dockerfile.tools -t lighthouse-kafka-tools:test .
